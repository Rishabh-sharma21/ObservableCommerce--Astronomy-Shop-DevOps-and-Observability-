---
# Product Catalog Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog
  namespace: astronomy-shop
  labels:
    app: product-catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-catalog
  template:
    metadata:
      labels:
        app: product-catalog
    spec:
      containers:
      - name: product-catalog
        image: astronomy-shop-lite-app:latest
        imagePullPolicy: IfNotPresent
        command: ["opentelemetry-instrument", "python", "-m", "services.product_catalog.app"]
        ports:
        - name: http
          containerPort: 3550
          protocol: TCP
        env:
        - name: PORT
          value: "3550"
        - name: OTEL_SERVICE_NAME
          value: product-catalog
        envFrom:
        - configMapRef:
            name: app-environment
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
      restartPolicy: Always

---
# Product Catalog Service
apiVersion: v1
kind: Service
metadata:
  name: product-catalog
  namespace: astronomy-shop
  labels:
    app: product-catalog
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3550
    targetPort: http
    protocol: TCP
  selector:
    app: product-catalog
