---
# ConfigMap for Prometheus configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: astronomy-shop
data:
  prometheus.yaml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs: 
      - job_name: otel-application-metrics
        static_configs:
          - targets: ["otel-collector:8889"]
